name: WebUI

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event_name == 'push' && github.sha || github.ref }}
  cancel-in-progress: true

jobs:
  webui:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        working-directory: webui
        run: bun install --frozen-lockfile

      - name: Build WebUI
        working-directory: webui
        run: bun run build

      - name: Verify tracked WebUI dist
        run: |
          test -n "$(git ls-files -- webui/dist)"
          git diff --exit-code -- webui/dist
          test -z "$(git ls-files --others --exclude-standard -- webui/dist)"
